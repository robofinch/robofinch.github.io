<!DOCTYPE html>
<html>
   <head>

      <script>
                                     const loaded   =   {
                               ALERTS                   :    true,
                               files                    :    {

                            'graphics/loadingScreen.js'      :     false,
                              'script/utils.js'              :     false,
                              'script/random.js'             :     false,
                            'graphics/canvas.js'             :     false,
                            'graphics/icon.js'               :     false,
                              'script/main.js'               :     false
                                                        }    }

      </script>

      <script src =           "script/utils.js"              defer ></script>
      <script src =           "script/random.js"             defer ></script>
      <script src =         "graphics/canvas.js"             defer ></script>
      <script src =         "graphics/loadingScreen.js"      defer ></script>

      <script src =           "script/main.js"               defer ></script>

      <script src =           "loadAlerts.js"                defer ></script>

      <style>
         .screen {

            position         :    absolute       ;
            left             :    0px            ;
            top              :    0px            ;
            width            :    inherit        ;
            height           :    inherit        ;

         }
         .hidden {

            display : none ;

         }
      </style>

   </head>
   <body id = "body">

      <div          id  =  "RenderDiv"         class = "screen"
                                               style = "width: 756px; height: 756px;" >

         <div       id  =  "BackgroundDiv"     class = "screen" >

            <div    id  =  "BackgroundStaticDiv"  class = "screen"
                 style  =  "image-rendering: pixelated; background-size: 30%;"   ></div>

            <div    id  =  "BackgroundShadowDiv"  class = "screen"               ></div>

         </div>

         <div    id  =  "TopDiv"            class = "screen hidden" >

            <div id  =  "IconDiv"           class = "screen" ></div>

         </div>


      </div>

      <div id = "InputDiv" style="position: relative; top: 1000px;" >

      <div>

         <input type  =  "text"
                id          =  "console"
                placeholder =  "pseudo-console"
                style       =  "width: 400px;" >
         <input type  =  "button"
                id          =  "consoleButton"
                value       =  "Run code" >

      </div>

      </div>

   </body>
